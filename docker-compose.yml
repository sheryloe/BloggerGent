name: ${COMPOSE_PROJECT_NAME:-bloggent}

x-api-common: &api-common
  image: bloggent-api:local
  env_file:
    - ${SERVICE_ENV_FILE:-.env}
  environment:
    DATABASE_URL: ${DATABASE_URL:-postgresql+psycopg2://bloggent:bloggent@postgres:5432/bloggent}
    REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
    STORAGE_ROOT: /app/storage
    PUBLIC_API_BASE_URL: ${PUBLIC_API_BASE_URL:-http://localhost:8000}
  volumes:
    - ./apps/api:/app
    - ${API_STORAGE_DIR:-./storage}:/app/storage
    - ./prompts:/app/prompts
  extra_hosts:
    - "host.docker.internal:host-gateway"

services:
  postgres:
    image: bloggent-postgres:local
    build:
      context: .
      dockerfile: infra/docker/postgres.Dockerfile
    command: postgres -c hba_file=/etc/postgresql/pg_hba.conf
    environment:
      POSTGRES_DB: bloggent
      POSTGRES_USER: bloggent
      POSTGRES_PASSWORD: bloggent
    volumes:
      - type: bind
        source: ${POSTGRES_DATA_DIR:-./.docker-data/postgres}
        target: /var/lib/postgresql/data
      - type: bind
        source: ./infra/docker/postgres/pg_hba.conf
        target: /etc/postgresql/pg_hba.conf
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bloggent -d bloggent"]
      interval: 10s
      timeout: 5s
      retries: 10
    ports:
      - "${POSTGRES_PORT:-5432}:5432"

  redis:
    image: bloggent-redis:local
    build:
      context: .
      dockerfile: infra/docker/redis.Dockerfile
    command: redis-server --appendonly yes
    volumes:
      - type: bind
        source: ${REDIS_DATA_DIR:-./.docker-data/redis}
        target: /data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

  api:
    <<: *api-common
    build:
      context: .
      dockerfile: infra/docker/api.Dockerfile
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "${API_PORT:-8000}:8000"
    command: >
      sh -c "python -m app.prestart &&
      alembic upgrade head &&
      uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload --reload-dir /app/app"

  web:
    image: bloggent-web:local
    build:
      context: .
      dockerfile: infra/docker/web.Dockerfile
    env_file:
      - ${SERVICE_ENV_FILE:-.env}
    environment:
      NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-http://localhost:8000/api/v1}
      API_INTERNAL_URL: ${API_INTERNAL_URL:-http://api:8000/api/v1}
      CHOKIDAR_USEPOLLING: "true"
      WATCHPACK_POLLING: "true"
    depends_on:
      api:
        condition: service_started
    volumes:
      - ./apps/web:/app
      - web_node_modules:/app/node_modules
    ports:
      - "${WEB_PORT:-3001}:3000"
    command: >
      sh -c "rm -rf /app/.next/server /app/.next/cache &&
      npm run dev -- --hostname 0.0.0.0 --port 3000"

  bootstrap:
    <<: *api-common
    profiles: ["bootstrap"]
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: "no"
    command: >
      sh -c "python -m app.prestart &&
      alembic upgrade head &&
      python -m app.seed"

  worker:
    <<: *api-common
    profiles: ["async", "full"]
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      api:
        condition: service_started
    command: >
      sh -c "python -m app.prestart &&
      alembic upgrade head &&
      celery -A app.core.celery_app.celery_app worker --loglevel=info --queues pipeline,default,training"

  scheduler:
    <<: *api-common
    profiles: ["async", "full"]
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      api:
        condition: service_started
    command: >
      sh -c "python -m app.prestart &&
      alembic upgrade head &&
      celery -A app.core.celery_app.celery_app beat --loglevel=info"

  minio:
    image: bloggent-minio:local
    build:
      context: .
      dockerfile: infra/docker/minio.Dockerfile
    profiles: ["storage", "full"]
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minio}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minio123}
    command: server /data --console-address ":9001"
    volumes:
      - type: bind
        source: ${MINIO_DATA_DIR:-./.docker-data/minio}
        target: /data
    ports:
      - "${MINIO_API_PORT:-9000}:9000"
      - "${MINIO_CONSOLE_PORT:-9001}:9001"

volumes:
  web_node_modules:
