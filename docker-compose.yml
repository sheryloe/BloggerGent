name: bloggent

services:
  postgres:
    image: bloggent-postgres:local
    build:
      context: .
      dockerfile: infra/docker/postgres.Dockerfile
    container_name: bloggent-postgres
    environment:
      POSTGRES_DB: bloggent
      POSTGRES_USER: bloggent
      POSTGRES_PASSWORD: bloggent
    volumes:
      - type: bind
        source: ${POSTGRES_DATA_DIR:-./.docker-data/postgres}
        target: /var/lib/postgresql/data
      - type: bind
        source: ./infra/docker/postgres/pg_hba.conf
        target: /var/lib/postgresql/data/pg_hba.conf
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bloggent -d bloggent"]
      interval: 10s
      timeout: 5s
      retries: 10
    ports:
      - "${POSTGRES_PORT:-5432}:5432"

  redis:
    image: bloggent-redis:local
    build:
      context: .
      dockerfile: infra/docker/redis.Dockerfile
    container_name: bloggent-redis
    command: redis-server --appendonly yes
    volumes:
      - type: bind
        source: ${REDIS_DATA_DIR:-./.docker-data/redis}
        target: /data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

  minio:
    image: bloggent-minio:local
    build:
      context: .
      dockerfile: infra/docker/minio.Dockerfile
    container_name: bloggent-minio
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minio}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minio123}
    command: server /data --console-address ":9001"
    volumes:
      - type: bind
        source: ${MINIO_DATA_DIR:-./.docker-data/minio}
        target: /data
    ports:
      - "9000:9000"
      - "9001:9001"

  api:
    image: bloggent-api:local
    build:
      context: .
      dockerfile: infra/docker/api.Dockerfile
    container_name: bloggent-api
    env_file:
      - .env
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql+psycopg2://bloggent:bloggent@postgres:5432/bloggent}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      STORAGE_ROOT: /app/storage
      PUBLIC_API_BASE_URL: ${PUBLIC_API_BASE_URL:-http://localhost:8000}
    volumes:
      - ./apps/api:/app
      - ./storage:/app/storage
      - ./prompts:/app/prompts
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "${API_PORT:-8000}:8000"
    command: >
      sh -c "python -m app.prestart &&
      alembic upgrade heads &&
      python -m app.seed &&
      uvicorn app.main:app --host 0.0.0.0 --port 8000"

  worker:
    image: bloggent-worker:local
    build:
      context: .
      dockerfile: infra/docker/api.Dockerfile
    container_name: bloggent-worker
    env_file:
      - .env
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql+psycopg2://bloggent:bloggent@postgres:5432/bloggent}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      STORAGE_ROOT: /app/storage
      PUBLIC_API_BASE_URL: ${PUBLIC_API_BASE_URL:-http://localhost:8000}
    volumes:
      - ./apps/api:/app
      - ./storage:/app/storage
      - ./prompts:/app/prompts
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      api:
        condition: service_started
    command: >
      sh -c "python -m app.prestart &&
      celery -A app.core.celery_app.celery_app worker --loglevel=info --queues pipeline,default,training"

  scheduler:
    image: bloggent-scheduler:local
    build:
      context: .
      dockerfile: infra/docker/api.Dockerfile
    container_name: bloggent-scheduler
    env_file:
      - .env
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql+psycopg2://bloggent:bloggent@postgres:5432/bloggent}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      STORAGE_ROOT: /app/storage
      PUBLIC_API_BASE_URL: ${PUBLIC_API_BASE_URL:-http://localhost:8000}
    volumes:
      - ./apps/api:/app
      - ./storage:/app/storage
      - ./prompts:/app/prompts
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      api:
        condition: service_started
    command: >
      sh -c "python -m app.prestart &&
      celery -A app.core.celery_app.celery_app beat --loglevel=info"

  web:
    image: bloggent-web:local
    build:
      context: .
      dockerfile: infra/docker/web.Dockerfile
    container_name: bloggent-web
    env_file:
      - .env
    environment:
      NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-http://localhost:8000/api/v1}
      API_INTERNAL_URL: ${API_INTERNAL_URL:-http://api:8000/api/v1}
    depends_on:
      api:
        condition: service_started
    ports:
      - "${WEB_PORT:-3001}:3000"
    command: npm run dev -- --hostname 0.0.0.0 --port 3000
