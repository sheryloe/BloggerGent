    <rect x="646" y="118" width="546" height="238" rx="26" fill="url(#cardB)"/>
    <rect x="170" y="390" width="430" height="238" rx="26" fill="url(#cardC)"/>
    <rect x="640" y="384" width="466" height="250" rx="26" fill="#FEFCE8"/>
  </g>

  <g fill="#0F172A" font-family="Arial, sans-serif">
    <text x="126" y="148" font-size="32" font-weight="700">Bloggent Mission Control</text>
    <text x="126" y="186" font-size="21" font-weight="600">게시 → 측정 → 분석 → 수정 → 재배포</text>

    <text x="126" y="244" font-size="18" font-weight="700">Blogger Room</text>
    <text x="126" y="270" font-size="16">SEO / CTR 리라이트 큐 자동 생성</text>
    <text x="126" y="296" font-size="16">Search Console + GA4 점수화</text>

    <text x="682" y="168" font-size="28" font-weight="700">YouTube Studio</text>
    <text x="682" y="204" font-size="16">영상 업로드 + 메타데이터 + 썸네일</text>
    <text x="682" y="230" font-size="16">기본 private 워크플로우</text>
    <text x="682" y="256" font-size="16">정책/감사 트랙 분리</text>

    <text x="682" y="430" font-size="28" font-weight="700">Instagram Desk</text>
    <text x="682" y="466" font-size="16">이미지 / 릴스 분리 큐</text>
    <text x="682" y="492" font-size="16">Capability-gated Publish Adapter</text>

    <text x="214" y="436" font-size="28" font-weight="700">Agent Runtime</text>
    <text x="214" y="472" font-size="16">Claude CLI · Codex CLI · Gemini CLI</text>
    <text x="214" y="498" font-size="16">OAuth 세션 재사용, 실행 로그 추적</text>
