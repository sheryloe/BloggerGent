<svg width="1280" height="720" viewBox="0 0 1280 720" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="80" y1="60" x2="1180" y2="680" gradientUnits="userSpaceOnUse">
      <stop stop-color="#0F172A"/>
      <stop offset="0.38" stop-color="#1D4ED8"/>
      <stop offset="1" stop-color="#EA580C"/>
    </linearGradient>
    <linearGradient id="cardA" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#FFF7ED"/>
      <stop offset="1" stop-color="#FED7AA"/>
    </linearGradient>
    <linearGradient id="cardB" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#ECFEFF"/>
      <stop offset="1" stop-color="#BAE6FD"/>
    </linearGradient>
    <linearGradient id="cardC" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#F5F3FF"/>
      <stop offset="1" stop-color="#DDD6FE"/>
    </linearGradient>
    <filter id="shadow" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="18" stdDeviation="18" flood-color="#0F172A" flood-opacity="0.28"/>
    </filter>
  </defs>

  <rect width="1280" height="720" rx="48" fill="url(#bg)"/>
  <circle cx="170" cy="118" r="110" fill="#F97316" fill-opacity="0.22"/>
  <circle cx="1120" cy="150" r="130" fill="#0EA5E9" fill-opacity="0.20"/>
  <circle cx="1080" cy="600" r="160" fill="#22C55E" fill-opacity="0.16"/>

  <g filter="url(#shadow)">
