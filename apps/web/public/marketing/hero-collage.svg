  <g>
    <rect x="998" y="562" width="190" height="52" rx="12" fill="#111827"/>
    <text x="1026" y="594" fill="#FFFFFF" font-size="18" font-family="Arial, sans-serif" font-weight="700">/dashboard</text>
  </g>
